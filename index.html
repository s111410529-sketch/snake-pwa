<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake PWA">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a2e'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='%2300ff88'%3E🐍%3C/text%3E%3C/svg%3E">
  <title>貪吃蛇 PWA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="header">
      <h1>🐍 貪吃蛇</h1>
      <div id="score-board">
        <div class="score-item">
          <span class="score-label">分數</span>
          <span id="score">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">最高</span>
          <span id="high-score">0</span>
        </div>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <h2 id="overlay-title">遊戲結束</h2>
        <p id="overlay-score">得分: 0</p>
        <button id="overlay-btn">重新開始</button>
      </div>
    </div>
    <div id="controls">
      <button id="btn-up" class="ctrl-btn" aria-label="上">▲</button>
      <div class="ctrl-row">
        <button id="btn-left" class="ctrl-btn" aria-label="左">◀</button>
        <button id="btn-down" class="ctrl-btn" aria-label="下">▼</button>
        <button id="btn-right" class="ctrl-btn" aria-label="右">▶</button>
      </div>
    </div>
    <p id="hint">方向鍵 / 滑動 控制方向</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
